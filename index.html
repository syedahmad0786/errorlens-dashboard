/* ================ DEFAULT: dark (brief-strict) =============== */
:root,
[data-theme="dark"] {
  --bg:           hsl(224, 20%, 6%);
  --bg-elevated:  hsl(224, 18%, 8%);
  --card:         hsl(224, 18%, 10%);
  --card-hover:   hsl(224, 16%, 13%);
  --border:       hsl(224, 14%, 16%);
  --border-bright:hsl(224, 14%, 22%);

  --text-primary:   hsl(0, 0%, 95%);
  --text-secondary: hsl(224, 10%, 62%);
  --text-tertiary:  hsl(224, 10%, 42%);

  --accent:         hsl(217, 91%, 60%);
  --accent-hover:   hsl(217, 91%, 55%);
  --accent-subtle:  hsla(217, 91%, 60%, 0.12);
  --accent-text:    hsl(0, 0%, 100%);

  --sev-critical: hsl(0, 84%, 60%);
  --sev-error:    hsl(25, 95%, 53%);
  --sev-warn:     hsl(45, 93%, 47%);
  --sev-info:     hsl(217, 91%, 60%);

  --status-open:     hsl(0, 84%, 60%);
  --status-ack:      hsl(45, 93%, 47%);
  --status-resolved: hsl(142, 71%, 45%);

  --font-sans: 'Geist', 'Inter', system-ui, sans-serif;
  --font-mono: 'Geist Mono', 'JetBrains Mono', monospace;
  --font-display: 'Geist', 'Inter', system-ui, sans-serif;

  --radius-sm: 6px;
  --radius:    8px;
  --radius-lg: 12px;
  --radius-xl: 16px;

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
  --shadow:    0 4px 16px rgba(0,0,0,0.3);
  --shadow-lg: 0 24px 64px rgba(0,0,0,0.5);

  --logo-display: none;        /* MA mark hidden on non-MA themes */
  --grid-line: hsla(217, 91%, 60%, 0.04);
}

/* ================ LIGHT (brief alt) =============== */
[data-theme="light"] {
  --bg:           hsl(0, 0%, 98%);
  --bg-elevated:  hsl(0, 0%, 100%);
  --card:         hsl(0, 0%, 100%);
  --card-hover:   hsl(224, 14%, 96%);
  --border:       hsl(224, 14%, 90%);
  --border-bright:hsl(224, 14%, 82%);

  --text-primary:   hsl(224, 20%, 12%);
  --text-secondary: hsl(224, 10%, 38%);
  --text-tertiary:  hsl(224, 10%, 55%);

  --accent:         hsl(217, 91%, 50%);
  --accent-hover:   hsl(217, 91%, 45%);
  --accent-subtle:  hsla(217, 91%, 50%, 0.10);
  --accent-text:    hsl(0, 0%, 100%);

  --sev-critical: hsl(0, 74%, 50%);
  --sev-error:    hsl(25, 90%, 48%);
  --sev-warn:     hsl(40, 90%, 42%);
  --sev-info:     hsl(217, 91%, 50%);

  --status-open:     hsl(0, 74%, 50%);
  --status-ack:      hsl(40, 90%, 42%);
  --status-resolved: hsl(142, 65%, 38%);

  --shadow-sm: 0 1px 2px rgba(16,16,16,0.04);
  --shadow:    0 2px 8px rgba(16,16,16,0.06);
  --shadow-lg: 0 12px 32px rgba(16,16,16,0.10);

  --grid-line: hsla(224, 20%, 12%, 0.04);
}

/* ================ MA-BRANDED =============== */
[data-theme="ma"] {
  --bg:           #f7f5f0;       /* warm off-white */
  --bg-elevated:  #ffffff;
  --card:         #ffffff;
  --card-hover:   #faf4d3;       /* light gold tint on hover */
  --border:       #e5e2da;
  --border-bright:#c9c5b8;

  --text-primary:   #000000;
  --text-secondary: #3a3a3a;     /* charcoal */
  --text-tertiary:  #8a8a8a;     /* mid gray */

  --accent:         #e8c020;     /* MA gold */
  --accent-hover:   #d4ad12;
  --accent-subtle:  rgba(232, 192, 32, 0.16);
  --accent-text:    #000000;

  /* Severity stays sacred — but tuned to live on warm off-white */
  --sev-critical: #c4302b;
  --sev-error:    #d97516;
  --sev-warn:     #c89a18;
  --sev-info:     #184010;       /* forest green replaces blue here */

  --status-open:     #c4302b;
  --status-ack:      #c89a18;
  --status-resolved: #184010;

  --font-sans: 'DM Sans', 'Helvetica Neue', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --font-display: 'Archivo', 'Helvetica Neue', sans-serif;

  --radius-sm: 2px;
  --radius:    4px;
  --radius-lg: 8px;
  --radius-xl: 8px;

  --shadow-sm: 0 1px 2px rgba(16,16,16,0.04);
  --shadow:    0 2px 8px rgba(16,16,16,0.06);
  --shadow-lg: 0 12px 32px rgba(16,16,16,0.09);

  --logo-display: block;
  --grid-line: rgba(0, 0, 0, 0.04);
}

/* density */
[data-density="compact"] {
  --row-h: 40px;
  --pad: 12px;
  --pad-lg: 16px;
}
[data-density="comfortable"] {
  --row-h: 56px;
  --pad: 16px;
  --pad-lg: 24px;
}

/* ===== accent overrides (tweak) ===== */
[data-accent="gold"]   { --accent: #e8c020; --accent-hover: #d4ad12; --accent-subtle: rgba(232,192,32,0.16); --accent-text: #000; }
[data-accent="forest"] { --accent: #2a7220; --accent-hover: #1f5417; --accent-subtle: rgba(42,114,32,0.15); --accent-text: #fff; }
[data-accent="violet"] { --accent: hsl(263, 80%, 60%); --accent-hover: hsl(263, 80%, 55%); --accent-subtle: hsla(263,80%,60%,0.12); --accent-text: #fff; }

/* ============== base ============= */
* { box-sizing: border-box; }
html, body { margin:0; padding:0; height:100%; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden; /* artboards manage own scroll */
}
button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
input, select, textarea { font-family: inherit; }
a { color: inherit; text-decoration: none; }
.mono, code { font-family: var(--font-mono); font-feature-settings: 'tnum' 1; }
[data-theme="ma"] h1, [data-theme="ma"] h2, [data-theme="ma"] h3 { font-family: var(--font-display); letter-spacing: -0.02em; }

/* ===== app shell ===== */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w, 240px) 1fr;
  height: 100%;
  background: var(--bg);
  color: var(--text-primary);
}
[data-sidebar="icon"] .app { --sidebar-w: 64px; }
[data-sidebar="full"] .app { --sidebar-w: 240px; }

/* ===== sidebar ===== */
.sidebar {
  background: var(--bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 16px 12px;
  overflow: hidden;
}
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 8px 18px 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}
.sidebar-logo svg { flex-shrink: 0; }
.sidebar-logo .wordmark {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
}
[data-theme="ma"] .sidebar-logo .wordmark { font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em; font-size: 13px; }
.sidebar-logo .sub {
  display: block;
  font-size: 9px;
  letter-spacing: 0.14em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  font-weight: 500;
  margin-top: 2px;
}
[data-sidebar="icon"] .sidebar-logo .wordmark { display: none; }

.nav-group { margin-top: 14px; }
.nav-group-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--text-tertiary);
  font-weight: 600;
  padding: 0 12px 6px 12px;
}
[data-sidebar="icon"] .nav-group-label { display: none; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 12px;
  height: 36px;
  border-radius: var(--radius);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  position: relative;
  transition: background 160ms, color 160ms;
  cursor: pointer;
}
.nav-item:hover { background: var(--card-hover); color: var(--text-primary); }
.nav-item.active {
  background: var(--accent-subtle);
  color: var(--text-primary);
  font-weight: 600;
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: -12px; top: 8px; bottom: 8px;
  width: 3px; border-radius: 0 2px 2px 0;
  background: var(--accent);
}
.nav-item .ico { width: 16px; height: 16px; flex-shrink: 0; }
.nav-item .label { white-space: nowrap; overflow: hidden; }
[data-sidebar="icon"] .nav-item .label { display: none; }
[data-sidebar="icon"] .nav-item { justify-content: center; padding: 0; }

.sidebar-foot {
  margin-top: auto;
  padding: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-hover));
  color: var(--accent-text);
  display: grid; place-items: center;
  font-size: 11px; font-weight: 700;
  flex-shrink: 0;
}
.sidebar-foot .meta { flex: 1; min-width: 0; }
.sidebar-foot .meta .org { font-size: 12px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-foot .meta .plan { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.1em; }
[data-sidebar="icon"] .sidebar-foot .meta { display: none; }

/* ===== topbar ===== */
.main { display: flex; flex-direction: column; min-width: 0; height: 100%; overflow: hidden; }
.topbar {
  height: 56px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  background: var(--bg);
}
.crumbs { display: flex; gap: 8px; align-items: center; font-size: 13px; color: var(--text-tertiary); }
.crumbs .sep { color: var(--text-tertiary); opacity: 0.5; }
.crumbs .current { color: var(--text-primary); font-weight: 500; }

.topbar-search {
  flex: 1;
  max-width: 460px;
  margin-left: auto;
  position: relative;
}
.topbar-search input {
  width: 100%; height: 32px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0 12px 0 32px;
  color: var(--text-primary);
  font-size: 13px;
  outline: none;
  transition: border-color 160ms;
}
.topbar-search input:focus { border-color: var(--border-bright); }
.topbar-search .ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-tertiary); }
.topbar-search .kbd { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); display: flex; gap: 2px; }
.kbd-key { padding: 2px 6px; font-size: 10px; font-family: var(--font-mono); background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text-tertiary); }

.icon-btn {
  width: 32px; height: 32px; border-radius: var(--radius);
  display: grid; place-items: center;
  color: var(--text-secondary);
  transition: background 160ms, color 160ms;
  position: relative;
}
.icon-btn:hover { background: var(--card-hover); color: var(--text-primary); }
.icon-btn .dot { position: absolute; top: 6px; right: 6px; width: 6px; height: 6px; background: var(--sev-critical); border-radius: 50%; border: 1.5px solid var(--bg); }

/* ===== content ===== */
.content {
  flex: 1;
  overflow: auto;
  padding: 24px;
  background: var(--bg);
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size: 32px 32px;
}
[data-theme="ma"] .content { background-image: none; }

.page-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 24px;
  gap: 16px;
}
.page-title {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text-primary);
  margin: 0;
}
[data-theme="ma"] .page-title { font-family: var(--font-display); font-weight: 700; }
.page-sub { color: var(--text-secondary); font-size: 13px; margin-top: 4px; }

/* status pill on overview */
.system-status {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border-radius: var(--radius-lg);
  background: var(--card);
  border: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-secondary);
}
.system-status .pulse {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--status-resolved);
  box-shadow: 0 0 0 0 currentColor;
  animation: pulse 2s infinite;
  color: var(--status-resolved);
}
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 hsla(142, 71%, 45%, 0.5); }
  70%  { box-shadow: 0 0 0 8px hsla(142, 71%, 45%, 0); }
  100% { box-shadow: 0 0 0 0 hsla(142, 71%, 45%, 0); }
}

/* ===== KPI cards ===== */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--pad-lg, 20px);
  position: relative;
  transition: transform 200ms var(--ease, cubic-bezier(0.16,1,0.3,1)), border-color 160ms;
}
.card:hover { border-color: var(--border-bright); }
.kpi {
  position: relative;
  overflow: hidden;
}
.kpi::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--kpi-color, var(--accent));
}
.kpi:hover { transform: translateY(-1px); }
.kpi-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-secondary);
  font-weight: 600;
  margin-bottom: 12px;
}
.kpi-row { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
.kpi-value {
  font-size: 30px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  line-height: 1;
}
[data-theme="ma"] .kpi-value { font-family: var(--font-display); font-weight: 800; }
.kpi-change {
  font-size: 11px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  padding: 3px 7px;
  border-radius: 999px;
  display: inline-flex; align-items: center; gap: 3px;
}
.kpi-change.up   { background: hsla(0, 84%, 60%, 0.15); color: var(--sev-critical); }
.kpi-change.down { background: hsla(142, 71%, 45%, 0.15); color: var(--status-resolved); }
.kpi-spark {
  margin-top: 12px;
  height: 36px;
  width: 100%;
}

/* ===== chart cards ===== */
.chart-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
.chart-card .card-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.card-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-secondary);
  font-weight: 600;
}
.card-meta { font-size: 12px; color: var(--text-tertiary); }
.seg {
  display: inline-flex;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2px;
}
.seg button {
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 500;
  border-radius: calc(var(--radius) - 2px);
  color: var(--text-secondary);
  transition: background 160ms, color 160ms;
}
.seg button.on { background: var(--card); color: var(--text-primary); box-shadow: var(--shadow-sm); }
.seg button:hover:not(.on) { color: var(--text-primary); }

/* timeline area */
.timeline-svg { width: 100%; height: 240px; display: block; }
.timeline-grid line { stroke: var(--border); stroke-dasharray: 2 4; }
.timeline-axis text { fill: var(--text-tertiary); font-size: 10px; font-family: var(--font-mono); }

/* severity bar */
.sev-bar {
  height: 28px;
  border-radius: 999px;
  display: flex;
  overflow: hidden;
  background: var(--card-hover);
  border: 1px solid var(--border);
}
.sev-bar > div { transition: flex 200ms; }
.sev-legend { margin-top: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.sev-legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.sev-legend-row .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sev-legend-row .name { color: var(--text-primary); font-weight: 500; flex: 1; }
.sev-legend-row .count { color: var(--text-tertiary); font-variant-numeric: tabular-nums; font-family: var(--font-mono); }

/* small multiples */
.sm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.sm-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
}
.sm-head { display: flex; align-items: center; gap: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-secondary); margin-bottom: 6px; font-weight: 600; }
.sm-num { font-family: var(--font-display); font-weight: 700; font-size: 22px; font-variant-numeric: tabular-nums; color: var(--text-primary); letter-spacing: -0.02em; }
.sm-card svg { width: 100%; height: 26px; margin-top: 4px; }

/* ===== feed list ===== */
.feed-list { display: flex; flex-direction: column; }
.feed-row {
  display: grid;
  grid-template-columns: 22px 28px 1fr auto auto;
  gap: 10px;
  align-items: center;
  padding: 10px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 160ms;
}
.feed-row + .feed-row { border-top: 1px solid var(--border); border-radius: 0; }
.feed-row:hover { background: var(--card-hover); }
.sev-dot { width: 8px; height: 8px; border-radius: 50%; }
.feed-row .platform { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.feed-row .msg { font-family: var(--font-mono); font-size: 12px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.feed-row .ts { font-size: 11px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; }

/* ===== badges ===== */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-family: var(--font-sans);
  white-space: nowrap;
}
[data-theme="ma"] .badge { border-radius: 2px; }
.badge.sev-critical { background: hsla(0,84%,60%,0.15); color: var(--sev-critical); }
.badge.sev-error    { background: hsla(25,95%,53%,0.15); color: var(--sev-error); }
.badge.sev-warn     { background: hsla(45,93%,47%,0.18); color: var(--sev-warn); }
.badge.sev-info     { background: var(--accent-subtle); color: var(--accent); }
.badge.status-open      { background: hsla(0,84%,60%,0.15); color: var(--status-open); }
.badge.status-ack       { background: hsla(45,93%,47%,0.18); color: var(--status-ack); }
.badge.status-resolved  { background: hsla(142,71%,45%,0.15); color: var(--status-resolved); }
[data-theme="ma"] .badge.sev-critical { background: rgba(196, 48, 43, 0.10); }
[data-theme="ma"] .badge.sev-warn { background: rgba(232, 192, 32, 0.20); color: #876c00; }
[data-theme="ma"] .badge.sev-info { background: #e8f0e4; color: #184010; }
[data-theme="ma"] .badge.status-resolved { background: #e8f0e4; color: #184010; }

/* ===== buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 32px;
  padding: 0 14px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  border: 1px solid transparent;
  transition: background 160ms, transform 100ms;
}
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--accent); color: var(--accent-text); }
.btn-primary:hover { background: var(--accent-hover); }
.btn-ghost { color: var(--text-secondary); border: 1px solid var(--border); background: var(--card); }
.btn-ghost:hover { background: var(--card-hover); color: var(--text-primary); }
.btn-icon { width: 32px; padding: 0; justify-content: center; }
.btn-lg { height: 40px; padding: 0 20px; font-size: 14px; }

/* ===== filter chips / segmented ===== */
.filter-bar {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.search-box {
  flex: 1; min-width: 280px; position: relative;
}
.search-box input {
  width: 100%; height: 36px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0 12px 0 34px;
  color: var(--text-primary);
  font-size: 13px;
  outline: none;
}
.search-box input:focus { border-color: var(--border-bright); }
.search-box .ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-tertiary); }
.chip-group {
  display: inline-flex;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2px;
  gap: 2px;
}
.chip {
  padding: 5px 10px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-radius: calc(var(--radius) - 2px);
  color: var(--text-secondary);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background 140ms, color 140ms;
}
.chip:hover { color: var(--text-primary); }
.chip.on { background: var(--card-hover); color: var(--text-primary); }
.chip.on.crit { background: hsla(0,84%,60%,0.15); color: var(--sev-critical); }
.chip.on.err  { background: hsla(25,95%,53%,0.15); color: var(--sev-error); }
.chip.on.warn { background: hsla(45,93%,47%,0.18); color: var(--sev-warn); }
.chip.on.info { background: var(--accent-subtle); color: var(--accent); }
.chip .dot { width: 6px; height: 6px; border-radius: 50%; }

/* ===== data table ===== */
.tbl {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
}
.tbl thead th {
  text-align: left;
  padding: 10px 16px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-tertiary);
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: var(--card);
  cursor: pointer;
  white-space: nowrap;
}
.tbl thead th:hover { color: var(--text-primary); }
.tbl tbody tr {
  cursor: pointer;
  transition: background 120ms;
}
.tbl tbody tr:hover { background: var(--card-hover); }
.tbl tbody td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
  white-space: nowrap;
}
.tbl tbody tr.expanded td { border-bottom: 0; }
.tbl tbody tr.expanded-row td {
  padding: 0;
  background: var(--bg);
}
.expand-pad { padding: 16px 24px 20px 56px; border-bottom: 1px solid var(--border); }
.tbl .col-msg { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 0; width: 100%; font-family: var(--font-mono); font-size: 12px; color: var(--text-primary); }
.tbl .col-wf { color: var(--text-secondary); }

.platform-row { display: inline-flex; align-items: center; gap: 8px; }
.platform-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  flex-shrink: 0;
}
/* severity icon badges */
.sev-icon { transition: transform 0.1s; }
.sev-icon:hover { transform: scale(1.1); }
/* status indicators */
.status-indicator { display: inline-flex; align-items: center; }
.status-indicator .active-pulse { animation: pulse-status 2s infinite; }
@keyframes pulse-status { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

/* ===== pagination ===== */
.pager {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text-tertiary);
}
.pager-ctrl { display: flex; gap: 4px; align-items: center; }

/* ===== code block / stack trace ===== */
.code-block {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 12px;
  position: relative;
  overflow: hidden;
}
[data-theme="dark"] .code-block { background: hsl(224, 22%, 4%); }
.code-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 11px; color: var(--text-tertiary);
}
.code-body { display: grid; grid-template-columns: 36px 1fr; }
.code-lines { padding: 12px 0; text-align: right; color: var(--text-tertiary); user-select: none; border-right: 1px solid var(--border); }
.code-lines div { padding: 0 8px; }
.code-content { padding: 12px 14px; overflow-x: auto; white-space: pre; color: var(--text-primary); line-height: 1.7; }
.code-tok-key { color: var(--accent); }
.code-tok-str { color: var(--status-resolved); }
.code-tok-fn  { color: var(--sev-warn); }
.code-tok-com { color: var(--text-tertiary); font-style: italic; }

/* ===== meta grid ===== */
.meta-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px 24px;
  padding: 16px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin: 16px 0;
}
.meta-grid .m-key { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-tertiary); font-weight: 600; }
.meta-grid .m-val { font-size: 13px; color: var(--text-primary); font-family: var(--font-mono); margin-top: 2px; }

/* ===== timeline ===== */
.lifecycle { padding-left: 6px; }
.lifecycle-item {
  display: grid;
  grid-template-columns: 24px 1fr;
  gap: 10px;
  position: relative;
  padding-bottom: 18px;
}
.lifecycle-item::before {
  content: '';
  position: absolute;
  left: 11px; top: 24px; bottom: -2px;
  width: 2px;
  background: var(--border);
}
.lifecycle-item:last-child::before { display: none; }
.lifecycle-dot {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: grid; place-items: center;
  background: var(--card);
  border: 2px solid var(--border);
  z-index: 1;
}
.lifecycle-dot.done { background: var(--status-resolved); border-color: var(--status-resolved); color: white; }
.lifecycle-dot.active { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }
.lifecycle-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.lifecycle-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

/* ===== integration cards ===== */
.platform-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.platform-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  transition: border-color 160ms;
}
.platform-card:hover { border-color: var(--border-bright); }
.platform-add {
  border: 1.5px dashed var(--border-bright);
  background: transparent;
  align-items: center;
  justify-content: center;
  text-align: center;
  cursor: pointer;
  min-height: 220px;
  color: var(--text-secondary);
}
.platform-add:hover { color: var(--text-primary); background: var(--card); }
.platform-head { display: flex; align-items: center; gap: 10px; }
.platform-logo {
  width: 36px; height: 36px;
  border-radius: var(--radius);
  display: grid; place-items: center;
  color: white; font-weight: 800; font-size: 13px;
}
.webhook {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px;
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
}
.webhook code { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ===== stepper ===== */
.stepper {
  display: grid;
  grid-template-columns: 1fr auto 1fr auto 1fr;
  align-items: center;
  gap: 12px;
  padding: 24px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 24px;
}
.step { display: flex; align-items: center; gap: 12px; }
.step-circle {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-weight: 700; font-size: 13px;
  background: var(--card-hover);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.step.done .step-circle { background: var(--status-resolved); color: white; border-color: var(--status-resolved); }
.step.active .step-circle { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
.step-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.step-sub { font-size: 11px; color: var(--text-tertiary); }
.step-line { height: 1px; background: var(--border); }

/* ===== empty state ===== */
.empty {
  text-align: center;
  padding: 64px 32px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}
.empty-art {
  width: 96px; height: 96px;
  margin: 0 auto 20px;
  color: var(--text-tertiary);
}
.empty-title { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
[data-theme="ma"] .empty-title { font-family: var(--font-display); }
.empty-sub { font-size: 13px; color: var(--text-secondary); max-width: 360px; margin: 0 auto 20px; }

/* ===== Alert rule cards ===== */
.rule-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  gap: 20px;
  align-items: center;
  transition: border-color 160ms;
  margin-bottom: 12px;
}
.rule-card:hover { border-color: var(--border-bright); }
.rule-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.rule-desc { font-size: 12px; color: var(--text-secondary); margin-top: 4px; font-family: var(--font-mono); }
.rule-channels { display: flex; gap: 6px; }
.channel-pill { width: 28px; height: 28px; border-radius: 50%; background: var(--card-hover); display: grid; place-items: center; color: var(--text-secondary); border: 1px solid var(--border); }
.toggle {
  width: 36px; height: 20px;
  background: var(--card-hover);
  border-radius: 999px;
  position: relative;
  cursor: pointer;
  transition: background 160ms;
  border: 1px solid var(--border);
}
.toggle.on { background: var(--accent); border-color: var(--accent); }
.toggle::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: white;
  top: 2px; left: 2px;
  transition: left 180ms var(--ease, cubic-bezier(0.16,1,0.3,1));
}
.toggle.on::after { left: 18px; }

/* template cards */
.tmpl-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 24px; }
.tmpl-card {
  text-align: left;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  cursor: pointer;
  transition: border-color 160ms, transform 160ms;
}
.tmpl-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.tmpl-icon { width: 28px; height: 28px; border-radius: var(--radius); background: var(--accent-subtle); color: var(--accent); display: grid; place-items: center; margin-bottom: 12px; }

/* Users grid */
.users-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.user-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  display: flex;
  gap: 14px;
  align-items: center;
  transition: border-color 160ms;
}
.user-card:hover { border-color: var(--border-bright); }
.user-card.admin { border-color: rgba(232, 192, 32, 0.5); }
.user-card.admin::before {
  content: '';
  position: absolute;
}
.user-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-weight: 700; font-size: 14px;
  color: white;
  flex-shrink: 0;
}
.user-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.user-email { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
.user-role-row { display: flex; gap: 6px; align-items: center; margin-top: 6px; }
.role-badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; }
.role-admin   { background: hsla(263, 80%, 60%, 0.18); color: hsl(263, 80%, 70%); }
.role-manager { background: var(--accent-subtle); color: var(--accent); }
.role-operator{ background: hsla(142, 71%, 45%, 0.15); color: var(--status-resolved); }
.role-viewer  { background: var(--card-hover); color: var(--text-secondary); }

/* Billing */
.plan-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 24px;
}
.usage-bar {
  height: 8px;
  background: var(--card-hover);
  border-radius: 999px;
  overflow: hidden;
  margin: 12px 0 6px;
}
.usage-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-hover));
  border-radius: 999px;
  transition: width 600ms var(--ease, cubic-bezier(0.16,1,0.3,1));
}
.pricing-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
.pricing-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px 24px;
  position: relative;
  transition: transform 200ms;
}
.pricing-card.featured {
  border-color: var(--accent);
  transform: scale(1.02);
}
.pricing-card.featured::before {
  content: 'Recommended';
  position: absolute;
  top: -10px; left: 24px;
  background: var(--accent);
  color: var(--accent-text);
  padding: 3px 10px;
  border-radius: var(--radius);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.price { font-size: 36px; font-weight: 700; color: var(--text-primary); font-family: var(--font-display); letter-spacing: -0.02em; }
[data-theme="ma"] .price { font-weight: 800; }
.price-period { font-size: 13px; color: var(--text-tertiary); }
.feature-list { list-style: none; padding: 0; margin: 20px 0; display: flex; flex-direction: column; gap: 10px; }
.feature-list li { display: flex; gap: 8px; font-size: 13px; color: var(--text-secondary); }

/* tabs */

.tab {

  font-size: 13px; font-weight: 500;

}
.tab:hover { color: var(--text-primary); }

/* danger zone */

/* sheet (right slide-in) */
.sheet-overlay {

  z-index: 50;

  pointer-events: none;
  transition: opacity 200ms;
}
.sheet-overlay.open { opacity: 1; pointer-events: auto; }
.sheet {
  position: absolute;

  z-index: 51;

  box-shadow: var(--shadow-lg);

.sheet.open { transform: translateX(0); }

.login-right {

.bottom-nav {

<script type="text/babel">
  const { useState, useEffect } = React;

  function getRouteFromHash() {
    const hash = window.location.hash.replace('#/', '').replace('#', '');
    const valid = ['overview','events','event','alerts','integrations','users','settings','login','workflows'];
    return valid.includes(hash) ? hash : 'overview';
  }

  function Root() {
    const [route, setRoute] = useState(getRouteFromHash);
    const [dataReady, setDataReady] = useState(!!window.EL_DATA && !!window.EL_DATA.workflows);

    useEffect(() => {
      const onHash = () => setRoute(getRouteFromHash());
      window.addEventListener('hashchange', onHash);
      return () => window.removeEventListener('hashchange', onHash);
    }, []);

    useEffect(() => {
      if (dataReady) return;
      if (window.EL_DATA && window.EL_DATA.workflows) { setDataReady(true); return; }
      const onReady = () => setDataReady(true);
      window.addEventListener('el:data-ready', onReady);
      if (window.EL_DATA_LOADING) {
        window.EL_DATA_LOADING.then(() => setDataReady(true)).catch(() => setDataReady(true));
      }
      return () => window.removeEventListener('el:data-ready', onReady);
    }, [dataReady]);

    if (!dataReady) {
      return (
        <div style={{ position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg,hsl(224,20%,6%))',flexDirection:'column',gap:16 }}>
          <div style={{ width:36,height:36,border:'3px solid hsl(224,14%,22%)',borderTopColor:'hsl(217,91%,60%)',borderRadius:'50%',animation:'spin .8s linear infinite' }}/>
          <div style={{ color:'hsl(224,10%,62%)',fontSize:14 }}>Loading live data from Supabase...</div>
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        </div>
      );
    }

    return (
      <div className="stage">
        <ErrorLensApp initialRoute={route} key={route}/>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
